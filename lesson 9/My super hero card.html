<!DOCTYPE html>
<html>
    <head>
        <ttile>My super hero card</ttile>
        <style>

            /* typography - font,size, weight, color for thee whole page */
            body {
                background-color: darkblue;
                color: white;
                font-family: arial, sans-serif;
            }

            /* typography - + text shadow - big bold title with an orange shadow */
            .hero-name {
                font-size: 60px;
                font-weight: bold;
                color:yellow;
                text-shadow: 3px 3px orange;
            }

            /* typhography + text transform - tagline becomes title case */
            .tagline {
                font-size: italic;
                color: lightblue;
                text-transform: capitalize;
            }

            /* typhography  text decoration - section heading in CAPS with underline */
            .lable {
                text-transform: uppercase;
                text-decoration: underline;
                color: coral;           
            }

            /* typhography - power stand out in boild green */
        .power {
            font-weight: bold;
            color: lightgreen;
        } 

        /* text decoration - weakness are crossed out */
        .weakness {
            text-decoration: line-through;
            color: gray;
        }

        /* transform - the badge is tilted to the side */
        .badge {
            font-size: 28px;
            font-weight:bold;
            color: gold;
            transform: rotate(15deg);
        }

        /* typhography - footer text */
        .made-by {
            color: coral;
            font-size: italic;
        }
        </style>
    </head>
    <body>

        <h1 class="hero-name">Thunder kid </h1>
        <p class="tagline">the most powerful hero in the school</p>
        <p class="lable">Super powers</p>
    <p class="power">can run faster than a cheata</p>
    <p class="power">can lift a school bus</p>
    

        <h2 class="lable">weaknesses </h2>
        <p class="weakness">Maths homewor</p>
        <p class="weakness">broccoli</p>

        <p class="badge">Top hero</p>

        <p class="made-by">Created by __________-</p>
    </body>
</html>
