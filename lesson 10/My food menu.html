<!DOCTYPE html>
<html?
<head>
    <title>MY Food Menu</title>
    <style>
        body {
            font-family: Arial;
            background: #fff8f0;
            padding: 30px;
            text-align: center;
        }

        h1 { color: #e65c00}

        /* sibling selector - styes the paragraph rieght after h1 */
        h1 + p {
            background: #ffe0b2;
            padding: 10px 20px;
            border-radius: 8px;
            color: #bf360c;
            display: inline-block;
        }

        ul { padding: 0; margin-top: 20px;}

        /*Child selector - styles only direct li children of ul */
        ul >li{
            list-style: none;
            font-size:18px;
            font-weight: bold;
            color: #5d4037;
padding: 10px 20px;
margin: 6px auto;
width: 260px;
background: #fff3e0;
border-radius: 8px;
        }

        /* nth-child - hights the 3rd item as chef's special */
        ul li:nth-child(3) {
            background: #ffe082;
            color : #555;
            margin-top: 20px;
            font-size: 15px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* first-letter - makes the first letter big and bold */
        .desc::first-letter {
            font-size: 220px;
            color: #e65c00;
            font-weight: bold;
        }

        .links { margin-top: 25px; }

        /* Hover effect _-links glow when moves over them */
        a {
            color: #e65c00;
            text-decoration: none;
            font-size: 15px;
            margin: 0 12px;
padding: 8px 18px;
border: 2px solid #e65c00;
border-radius: 8px;
        }

        a:hover { 
            background: #e65c00;
            color:white;
        }
    </style>
</head> 
<body>
<h1>My food menu</h1>
<p>Pick your favorite dish and dig in!</p>

<ul>
    <li>Pizza</li>
    <li>burger</li>
    <li>tacos-chef's special!</li>
    <li>noodles</li>
    <li>ice-cream</li>
</ul>

<p class="desc">Every dish on this is made with love and 
    loads of flavours. try them all and find your favorite!</p>

    <div class="links">
    <a href="#">Order Now</a>
    <a href="#">See more</a>
</div>
</body>
